name: Unit Tests

permissions:
  contents: read

on:
  push:
    branches: [main]

  pull_request:

  merge_group:

  workflow_dispatch:
    inputs:
      test_label:
        description: "Backend test label filter"
        default: 'unit'
        required: true
        type: string
      default_namespace:
        description: "Default namespace for backend testing"
        default: 'test-namespace'
        required: false
        type: string

concurrency:
  group: unit-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api-server: ${{ steps.detect.outputs.api-server }}
      runner: ${{ steps.detect.outputs.runner }}
      cli: ${{ steps.detect.outputs.cli }}
      ambient-ui: ${{ steps.detect.outputs.ui }}
      scripts: ${{ steps.detect.outputs.scripts }}
      demo-creator: ${{ steps.detect.outputs.demo-creator }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect changed components
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_REF: ${{ github.event_name == 'push' && github.event.before || github.event_name == 'merge_group' && github.event.merge_group.base_sha || 'origin/main' }}
        run: bash .github/scripts/detect-components.sh --outputs

  api-server:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.api-server == 'true' || github.event_name == 'workflow_dispatch'
    name: API Server Integration Tests
    defaults:
      run:
        working-directory: components/ambient-api-server

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'components/ambient-api-server/go.mod'
          cache-dependency-path: 'components/ambient-api-server/go.sum'

      - name: Create secrets directory
        run: |
          mkdir -p secrets
          printf '%s' 'localhost' > secrets/db.host
          printf '%s' '5432' > secrets/db.port
          printf '%s' 'ambient_api_server' > secrets/db.name
          printf '%s' 'postgres' > secrets/db.user
          printf '%s' 'postgres' > secrets/db.password

      - name: Run tests
        run: make test

      - name: Run gRPC RBAC tests (authz enabled)
        run: make test-rbac

  runner:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.runner == 'true' || github.event_name == 'workflow_dispatch'
    name: Ambient Runner Tests
    defaults:
      run:
        working-directory: components/runners/ambient-runner

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install dependencies
        run: uv sync --frozen --all-extras --group dev

      - name: Run unit tests with coverage
        run: |
          uv run pytest tests/ -v --tb=short --color=yes -x --cov=ambient_runner --cov-report=term-missing --cov-report=xml


  cli:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.cli == 'true' || github.event_name == 'workflow_dispatch'
    name: CLI Build and Tests

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'components/ambient-cli/go.mod'
          cache-dependency-path: 'components/ambient-cli/go.sum'

      - name: Build binary
        run: |
          cd components/ambient-cli
          go build -ldflags "-X github.com/ambient-code/platform/components/ambient-cli/pkg/info.Version=ci-${{ github.sha }}" -o acpctl ./cmd/acpctl/

      - name: Verify binary runs
        run: |
          cd components/ambient-cli
          ./acpctl version
          ./acpctl --help

      - name: Run unit tests
        run: |
          cd components/ambient-cli
          go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: always()
        with:
          name: cli-coverage-${{ github.run_id }}
          path: components/ambient-cli/coverage.out
          retention-days: 7

  ambient-ui:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.ambient-ui == 'true' || github.event_name == 'workflow_dispatch'
    name: Ambient UI Unit Tests (Vitest)
    defaults:
      run:
        working-directory: components/ambient-ui

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: 'components/ambient-ui/package.json'
          cache: 'npm'
          cache-dependency-path: 'components/ambient-ui/package-lock.json'

      - name: 'Build ambient-sdk (file: dependency)'
        working-directory: components/ambient-sdk/ts-sdk
        run: npm ci && npm run build

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npx vitest run --coverage

  scripts:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.scripts == 'true' || github.event_name == 'workflow_dispatch'
    name: Script Tests (model-discovery)
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Run tests
        run: python tests/unit/test_model_discovery.py -v

  demo-creator:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.demo-creator == 'true' || github.event_name == 'workflow_dispatch'
    name: Demo Creator Tests
    defaults:
      run:
        working-directory: skills/tooling/demo-creator/scripts
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'skills/tooling/demo-creator/scripts/package-lock.json'

      - name: Install media and OCR dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            ffmpeg \
            tesseract-ocr

          ffmpeg -hide_banner -filters 2>&1 | grep -E '(^|[[:space:]])ass[[:space:]]' >/dev/null
          ffmpeg -hide_banner -filters 2>&1 | grep -E '(^|[[:space:]])drawtext[[:space:]]' >/dev/null
          ffmpeg -hide_banner -encoders 2>&1 | grep -E '(^|[[:space:]])libx264[[:space:]]' >/dev/null
          ffprobe -version >/dev/null
          tesseract --version >/dev/null

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: |
          # `node --test` (what `npm test` runs) exits 0 even when its glob
          # matches zero files, so a moved test directory, a wrong
          # working-directory, or a Node without `**` support would let this job
          # report a false green. Fail loudly if the same glob resolves to
          # nothing before trusting the runner's exit code.
          shopt -s globstar nullglob
          test_files=(../tests/**/*.test.mjs)
          if [ "${#test_files[@]}" -eq 0 ]; then
            echo "::error::no demo-creator test files matched ../tests/**/*.test.mjs" >&2
            exit 1
          fi
          echo "Discovered ${#test_files[@]} demo-creator test files"
          npm test

  summary:
    name: Unit Tests CI Gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: read
    needs: [detect-changes, api-server, runner, cli, ambient-ui, scripts, demo-creator]
    if: always()
    steps:
      - name: Check overall status
        run: |
          failed=false
          for result in \
            "${{ needs.detect-changes.result }}" \
            "${{ needs.api-server.result }}" \
            "${{ needs.runner.result }}" \
            "${{ needs.cli.result }}" \
            "${{ needs.ambient-ui.result }}" \
            "${{ needs.scripts.result }}" \
            "${{ needs.demo-creator.result }}"; do
            if [ "$result" == "failure" ] || [ "$result" == "cancelled" ]; then
              failed=true
            fi
          done
          if [ "$failed" == "true" ]; then
            echo "Unit tests failed"
            echo "  detect-changes: ${{ needs.detect-changes.result }}"
            echo "  api-server: ${{ needs.api-server.result }}"
            echo "  runner: ${{ needs.runner.result }}"
            echo "  cli: ${{ needs.cli.result }}"
            echo "  ambient-ui: ${{ needs.ambient-ui.result }}"
            echo "  scripts: ${{ needs.scripts.result }}"
            echo "  demo-creator: ${{ needs.demo-creator.result }}"
            exit 1
          fi
          echo "All unit tests passed!"

      - name: Checkout code
        if: github.event_name == 'pull_request'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Try enqueue
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.AUTO_MERGE_PAT }}
        run: bash .github/scripts/try-enqueue.sh "${{ github.event.pull_request.number }}" "Unit Tests CI Gate"
