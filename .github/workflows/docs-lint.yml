name: Docs Lint

on:
  pull_request:
    paths:
      - 'docs/**'

permissions:
  contents: read

jobs:
  lint:
    name: Lint Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: docs/package-lock.json

    - name: Install Vale
      run: |
        curl -sfL https://github.com/errata-ai/vale/releases/download/v3.14.1/vale_3.14.1_Linux_64-bit.tar.gz | tar xz -C /usr/local/bin vale

    - name: Install npm tools
      run: npm install -g markdownlint-cli2 cspell

    - name: Run Vale
      working-directory: docs
      run: vale src/content/docs/

    - name: Run markdownlint
      working-directory: docs
      run: markdownlint-cli2 "src/content/docs/**/*.md"

    - name: Run cspell
      working-directory: docs
      run: cspell lint --no-progress --config cspell.json "src/content/docs/**/*.md"

    - name: Build docs (structural validation)
      working-directory: docs
      run: |
        npm ci
        npx playwright install --with-deps chromium
        npm run build
