version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
    - /home/sandbox
  read_write:
    - /workspace
    - /tmp
    - /dev/null
    - /app/.claude

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  anthropic_api:
    name: anthropic-api
    endpoints:
      - { host: api.anthropic.com, port: 443 }
      - { host: statsig.anthropic.com, port: 443 }
    binaries:
      - { path: /usr/local/bin/claude }
      - { path: /usr/local/lib/python3.12/site-packages/claude_agent_sdk/_bundled/claude }
      - { path: /usr/bin/node }
      - { path: /usr/bin/node-22 }
      - { path: /usr/bin/curl }

  vertex_ai:
    name: vertex-ai
    endpoints:
      - { host: us-east5-aiplatform.googleapis.com, port: 443 }
      - { host: europe-west1-aiplatform.googleapis.com, port: 443 }
      - { host: us-central1-aiplatform.googleapis.com, port: 443 }
      - { host: oauth2.googleapis.com, port: 443 }
    binaries:
      - { path: /usr/local/bin/claude }
      - { path: /usr/local/lib/python3.12/site-packages/claude_agent_sdk/_bundled/claude }
      - { path: /usr/bin/node }
      - { path: /usr/bin/node-22 }
      - { path: /usr/bin/curl }

  github:
    name: github
    endpoints:
      - { host: github.com, port: 443 }
      - { host: api.github.com, port: 443 }
    binaries:
      - { path: /usr/bin/git }
      - { path: /usr/local/bin/gh }
      - { path: /usr/bin/curl }

  npm_registry:
    name: npm-registry
    endpoints:
      - { host: registry.npmjs.org, port: 443 }
    binaries:
      - { path: /usr/bin/npm }
      - { path: /usr/bin/node }
      - { path: /usr/bin/node-22 }
      - { path: /usr/bin/npx }

  pypi:
    name: pypi
    endpoints:
      - { host: pypi.org, port: 443 }
      - { host: files.pythonhosted.org, port: 443 }
    binaries:
      - { path: /usr/bin/pip3 }
      - { path: /usr/bin/python3 }

  gitlab:
    name: gitlab
    endpoints:
      - { host: gitlab.com, port: 443 }
    binaries:
      - { path: /usr/bin/git }
      - { path: /usr/local/bin/glab }

  mcp_sidecars:
    name: mcp-sidecars
    endpoints:
      - allowed_ips: ["10.0.0.0/8"]
        port: 8090
      - allowed_ips: ["10.0.0.0/8"]
        port: 8091
      - allowed_ips: ["10.0.0.0/8"]
        port: 8092
      - allowed_ips: ["10.0.0.0/8"]
        port: 8093
      - allowed_ips: ["10.0.0.0/8"]
        port: 8094
      - { host: 127.0.0.1, port: 8090 }
      - { host: 127.0.0.1, port: 8091 }
      - { host: 127.0.0.1, port: 8092 }
      - { host: 127.0.0.1, port: 8093 }
      - { host: 127.0.0.1, port: 8094 }
      - { host: localhost, port: 8090 }
      - { host: localhost, port: 8091 }
      - { host: localhost, port: 8092 }
      - { host: localhost, port: 8093 }
      - { host: localhost, port: 8094 }
    binaries:
      - { path: /usr/local/bin/claude }
      - { path: /usr/local/lib/python3.12/site-packages/claude_agent_sdk/_bundled/claude }
      - { path: /usr/bin/node }
      - { path: /usr/bin/node-22 }
      - { path: /usr/bin/curl }
