components:
  schemas:
    Credential:
      allOf:
        - $ref: 'openapi.yaml#/components/schemas/ObjectReference'
        - type: object
          required:
            - name
            - provider
          properties:
            name:
              type: string
            description:
              type: string
            provider:
              type: string
              enum: [github, gitlab, jira, google, vertex, kubeconfig]
            token:
              type: string
              writeOnly: true
              description: Credential token value; write-only, never returned in GET/LIST responses
            url:
              type: string
            email:
              type: string
            labels:
              type: string
            annotations:
              type: string
    CredentialList:
      allOf:
        - $ref: 'openapi.yaml#/components/schemas/List'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Credential'
    CredentialPatchRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        provider:
          type: string
          enum: [github, gitlab, jira, google, vertex, kubeconfig]
        token:
          type: string
          writeOnly: true
          description: Credential token value; write-only, never returned in GET/LIST responses
        url:
          type: string
        email:
          type: string
        labels:
          type: string
        annotations:
          type: string
    CredentialTokenResponse:
      type: object
      required:
        - credential_id
        - provider
        - token
      properties:
        credential_id:
          type: string
          description: ID of the credential
        provider:
          type: string
          enum: [github, gitlab, jira, google, vertex, kubeconfig]
          description: Provider type for this credential
        token:
          type: string
          description: Decrypted token value
  parameters:
      id:
        name: id
        in: path
        description: The id of the project
        required: true
        schema:
          type: string
      cred_id:
        name: cred_id
        in: path
        description: The id of the credential
        required: true
        schema:
          type: string
      page:
        name: page
        in: query
        description: Page number of record list when record list exceeds specified page size
        schema:
          type: integer
          default: 1
          minimum: 1
        required: false
      size:
        name: size
        in: query
        description: Maximum number of records to return
        schema:
          type: integer
          default: 100
          minimum: 0
        required: false
      search:
        name: search
        in: query
        required: false
        description: |-
          Specifies the search criteria. The syntax of this parameter is
          similar to the syntax of the _where_ clause of an SQL statement,
          using the names of the json attributes / column names of the account.
          For example, in order to retrieve all the accounts with a username
          starting with `my`:

          ```sql
          username like 'my%'
          ```

          The search criteria can also be applied on related resource.
          For example, in order to retrieve all the subscriptions labeled by `foo=bar`,

          ```sql
          subscription_labels.key = 'foo' and subscription_labels.value = 'bar'
          ```

          If the parameter isn't provided, or if the value is empty, then
          all the accounts that the user has permission to see will be
          returned.
        schema:
          type: string
      orderBy:
        name: orderBy
        in: query
        required: false
        description: |-
          Specifies the order by criteria. The syntax of this parameter is
          similar to the syntax of the _order by_ clause of an SQL statement,
          but using the names of the json attributes / column of the account.
          For example, in order to retrieve all accounts ordered by username:

          ```sql
          username asc
          ```

          Or in order to retrieve all accounts ordered by username _and_ first name:

          ```sql
          username asc, firstName asc
          ```

          If the parameter isn't provided, or if the value is empty, then
          no explicit ordering will be applied.
        schema:
          type: string
      fields:
        name: fields
        in: query
        required: false
        description: |-
          Supplies a comma-separated list of fields to be returned.
          Fields of sub-structures and of arrays use <structure>.<field> notation.
          <stucture>.* means all field of a structure
          Example: For each Subscription to get id, href, plan(id and kind) and labels (all fields)

          ```
          curl "/api/ambient/v1/sessions?fields=id,href,name"
          ```
        schema:
          type: string
