---
# Gateway StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: openshell-gateway
  namespace: NAMESPACE_PLACEHOLDER
  labels:
    app.kubernetes.io/name: openshell
    app.kubernetes.io/component: gateway
    app.kubernetes.io/managed-by: agent-control-plane
spec:
  serviceName: openshell-gateway
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openshell
      app.kubernetes.io/instance: openshell-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openshell
        app.kubernetes.io/instance: openshell-gateway
        app.kubernetes.io/component: gateway
        app.kubernetes.io/managed-by: agent-control-plane
    spec:
      terminationGracePeriodSeconds: 5
      serviceAccountName: openshell-gateway
      securityContext:
        fsGroup: 1000
      containers:
        - name: openshell-gateway
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: IfNotPresent
          args:
            - --config
            - /etc/openshell/gateway.toml
            - --db-url
            - "sqlite:/var/openshell/openshell.db"
          volumeMounts:
            - name: openshell-data
              mountPath: /var/openshell
            - name: gateway-config
              mountPath: /etc/openshell
              readOnly: true
            - name: sandbox-jwt
              mountPath: /etc/openshell-jwt
              readOnly: true
            - name: tls-cert
              mountPath: /etc/openshell-tls/server
              readOnly: true
            - name: tls-client-ca
              mountPath: /etc/openshell-tls/client-ca
              readOnly: true
          ports:
            - name: grpc
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 2
            timeoutSeconds: 1
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 1
            periodSeconds: 2
            timeoutSeconds: 1
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: gateway-config
          configMap:
            name: openshell-gateway-config
        - name: sandbox-jwt
          secret:
            secretName: openshell-gateway-jwt-keys
            defaultMode: 256
        - name: tls-cert
          secret:
            secretName: openshell-server-tls
        - name: tls-client-ca
          secret:
            secretName: openshell-server-tls
            items:
              - key: ca.crt
                path: ca.crt
  volumeClaimTemplates:
    - metadata:
        name: openshell-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
