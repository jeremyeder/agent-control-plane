---
# ServiceAccount for cert generation job
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openshell-gateway-certgen
  namespace: NAMESPACE_PLACEHOLDER
  labels:
    app.kubernetes.io/name: openshell
    app.kubernetes.io/component: gateway
    app.kubernetes.io/managed-by: agent-control-plane
---
# Role for cert generation
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openshell-gateway-certgen
  namespace: NAMESPACE_PLACEHOLDER
  labels:
    app.kubernetes.io/name: openshell
    app.kubernetes.io/component: gateway
    app.kubernetes.io/managed-by: agent-control-plane
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
# RoleBinding for cert generation
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openshell-gateway-certgen
  namespace: NAMESPACE_PLACEHOLDER
  labels:
    app.kubernetes.io/name: openshell
    app.kubernetes.io/component: gateway
    app.kubernetes.io/managed-by: agent-control-plane
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openshell-gateway-certgen
subjects:
  - kind: ServiceAccount
    name: openshell-gateway-certgen
    namespace: NAMESPACE_PLACEHOLDER
---
# Job to generate TLS certs and JWT keys
apiVersion: batch/v1
kind: Job
metadata:
  name: openshell-gateway-certgen
  namespace: NAMESPACE_PLACEHOLDER
  labels:
    app.kubernetes.io/name: openshell
    app.kubernetes.io/component: gateway
    app.kubernetes.io/managed-by: agent-control-plane
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 120
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openshell
        app.kubernetes.io/instance: openshell-gateway
    spec:
      restartPolicy: OnFailure
      serviceAccountName: openshell-gateway-certgen
      containers:
        - name: certgen
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          command: ["/usr/local/bin/openshell-gateway"]
          args:
            - generate-certs
            - --server-secret-name=openshell-server-tls
            - --client-secret-name=openshell-client-tls
            - --jwt-secret-name=openshell-gateway-jwt-keys
            - --server-san=openshell-gateway.NAMESPACE_PLACEHOLDER.svc.cluster.local
