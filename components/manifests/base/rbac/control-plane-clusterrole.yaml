apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ambient-control-plane
rules:
# Namespaces (create and label per-project namespaces)
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# RoleBindings (reconcile group access from ProjectSettings)
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "rolebindings"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# ConfigMaps (read agent/provider/policy declarations from tenant namespaces)
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
# Session runner resources (provision/deprovision per-session workloads in project namespaces)
- apiGroups: [""]
  resources: ["secrets", "serviceaccounts", "services", "pods"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# ConfigMaps (watch platform-config, create/delete gateway configs including CA bundles)
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "watch", "list", "create", "update", "patch", "delete"]
# Deployments, StatefulSets (gateway provisioning)
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "statefulsets/finalizers"]
  verbs: ["create", "get", "update", "patch"]
# NetworkPolicies (gateway isolation)
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies"]
  verbs: ["create", "get", "update", "patch"]
# ClusterRoles and ClusterRoleBindings (gateway RBAC)
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["clusterroles", "clusterrolebindings"]
  verbs: ["create", "get", "update", "patch", "escalate", "bind"]
# Nodes (for gateway to read node info)
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
# TokenReviews (for gateway authentication)
- apiGroups: ["authentication.k8s.io"]
  resources: ["tokenreviews"]
  verbs: ["create"]
# Events (for gateway to watch events)
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list", "watch"]
# Gateway API (GRPCRoute + BackendTLSPolicy for gateway route exposure)
- apiGroups: ["gateway.networking.k8s.io"]
  resources: ["grpcroutes", "backendtlspolicies"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]
- apiGroups: ["gateway.networking.k8s.io"]
  resources: ["gateways"]
  verbs: ["get", "list"]
# Cluster ingress config (auto-detect base domain for Gateway API hostnames)
- apiGroups: ["config.openshift.io"]
  resources: ["ingresses"]
  verbs: ["get"]
# cert-manager (TLS certificate lifecycle for gateways)
- apiGroups: ["cert-manager.io"]
  resources: ["issuers", "certificates"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]
# Sandboxes (OpenShell agent CRD)
- apiGroups: ["agents.x-k8s.io"]
  resources: ["sandboxes", "sandboxes/status"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
