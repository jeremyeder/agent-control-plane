apiVersion: apps/v1
kind: Deployment
metadata:
  name: ambient-ui
spec:
  template:
    spec:
      containers:
      - name: ambient-ui
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop: ["ALL"]
