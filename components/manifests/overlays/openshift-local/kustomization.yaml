apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ambient-code

resources:
- ../../base
- secrets.yaml
- test-user.yaml
- postgresql-credentials.yaml
- mlflow-db-credentials.yaml
- ldap-config.yaml
- ldap-credentials.yaml
- keycloak-deployment.yaml
- sso-credentials.yaml
- api-server-route.yaml
- ui-route.yaml

patches:
- path: ambient-api-server-dev-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: ambient-api-server
    version: v1
- path: api-server-db-security-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: ambient-api-server-db
    version: v1
- path: control-plane-env-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: ambient-control-plane
- path: namespace-patch.yaml
  target:
    kind: Namespace
    name: ambient-code
- path: api-server-security-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: ambient-api-server
- path: limitrange-patch.yaml
  target:
    kind: LimitRange
    name: ambient-default-limits
- path: api-server-resources-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: ambient-api-server
- path: control-plane-resources-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: ambient-control-plane
- path: ui-resources-patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: ambient-ui

replicas:
- name: minio
  count: 0
- name: postgresql
  count: 0

configMapGenerator:
- name: keycloak-realm-config
  files:
  - ambient-code-realm.json=keycloak-realm.json
  options:
    disableNameSuffixHash: true
- name: keycloak-acp-theme
  files:
  - theme.properties=keycloak-theme/theme.properties
  - login.css=keycloak-theme/login.css
  - acp-logo.svg=keycloak-theme/acp-logo.svg
  - messages_en.properties=keycloak-theme/messages_en.properties
  options:
    disableNameSuffixHash: true
