# Agent Sandbox Configuration Example
#
# Complete example of ConfigMap-based agent, provider, and policy declarations.
# Apply to a tenant namespace (e.g. "tenant-a") with:
#   kubectl apply -n tenant-a -f agent-sandbox-config.yaml
#
# Prerequisites:
#   - OPENSHELL_USE_GATEWAY=true on the control plane
#   - Secrets referenced by providers must exist in the namespace before applying:
#       kubectl create secret generic vertex-sa-key --from-literal=token="$(cat vertex.json)" -n tenant-a
#       kubectl create secret generic github-pat --from-literal=token=<your-pat> -n tenant-a
#       kubectl create secret generic anthropic-key --from-literal=token=<your-key> -n tenant-a
#   - The namespace must correspond to an ACP project
#   - For vertex: operator-config must set ANTHROPIC_VERTEX_PROJECT_ID and CLOUD_ML_REGION
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: provider-declarations
  labels:
    ambient.ai/kind: provider
data:
  vertex: |
    name: vertex
    type: vertex
    secret: vertex-sa-key
  github: |
    name: github
    type: github
    secret: github-pat
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: policy-declarations
  labels:
    ambient.ai/kind: policy
data:
  restricted-github-only: |
    name: restricted-github-only
    network_policies:
      github_api:
        endpoints:
          - host: api.github.com
            port: 443
            protocol: rest
            rules:
              - allow:
                  method: "*"
                  path: "/**"
        binaries:
          - path: /usr/bin/git
      inference:
        endpoints:
          - host: inference.local
            port: 443
            protocol: rest
            rules:
              - allow:
                  method: POST
                  path: "/v1/**"
    filesystem:
      read_write:
        - /sandbox
        - /tmp
      read_only:
        - /usr
        - /etc
        - /lib
    process:
      run_as_user: sandbox
      run_as_group: sandbox
    landlock:
      compatibility: best_effort
  permissive-dev: |
    name: permissive-dev
    filesystem:
      read_write:
        - /sandbox
        - /tmp
      read_only:
        - /usr
        - /etc
    process:
      run_as_user: sandbox
      run_as_group: sandbox
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-declarations
  labels:
    ambient.ai/kind: agent
data:
  default: |
    name: hello-world
    display_name: Hello World
    description: Tells claude to say "hello world", great for testing.
    entrypoint: claude
    providers:
      - vertex
    prompt: "Say hello world"
  security-reviewer: |
    name: security-reviewer
    display_name: Security Reviewer
    description: Reviews PRs for security vulnerabilities and OWASP top-10 issues.
    entrypoint: claude
    prompt: |
      You are a security reviewer. Analyze code for vulnerabilities including
      injection attacks, authentication issues, and insecure data handling.
      Report findings with severity, location, and remediation guidance.
    providers:
      - vertex
      - github
    payloads:
      - sandbox_path: /sandbox/CLAUDE.md
        content: |
          # Security Review Agent
          Focus on OWASP top-10 vulnerabilities.
          Always check for hardcoded secrets.
      - sandbox_path: /sandbox/workspace
        repo_url: https://github.com/openshift-online/agent-control-plane
        ref: main
    environment:
      LOG_LEVEL: info
      REVIEW_MODE: strict
    sandbox_template:
      resources:
        cpu: "2"
        memory: 4Gi
    sandbox_policy: restricted-github-only
